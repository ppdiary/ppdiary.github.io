<a href=/tags>標籤</a></div></nav></div></header><main><div class="container content"><article class=post-box><header><h1 class=post-title>LifeLog 生活軌跡</h1><div class=post-date>2026-04-15</div></header><div class=post-content><p>我看了《活用一輩子的筆記術》這本書之後，馬上實際做做看。
拿平常使用的手帳本、黑色原子筆，記下今天做了哪些事。</p><p>利用作者提出的三種時間記錄方式（以十點為例）：
10:00 之前、10:00、10:00 為止</p><p>如此一來，不用去回想「我是從什麼時候開始做這件事」，不追求完整的時間段，只掌握寫記錄當下的時間，就會比較輕鬆。</p><hr><p>但，這整件事對我來說並不輕鬆。
嘗試到第二天，宣告失敗。</p></div></article></div></main><footer><div class=container style="text-align:center;color:#888;font-size:.9em;padding:40px 0"><hr style="border:0;border-top:1px solid #eee;margin-bottom:20px">Made with <a href=https://gohugo.io style=color:#888>Hugo</a> ʕ•ᴥ•ʔ <a href=https://github.com/janraasch/hugo-bearblog style=color:#888>Bear</a></div></footer></body></html>
