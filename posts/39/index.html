<a href=/tags>標籤</a></div></nav></div></header><main><div class="container content"><article class=post-box><header><h1 class=post-title>一百四十字</h1><div class=post-date>2026-05-30</div></header><div class=post-content><p>兩封中文簡訊的字數上限大約 140 字，
一則 X（之前叫做 Twitter）的字數上限也是 140 字。</p><p>蠻懷念小時候，寄簡訊要字字斟酌，
標點符號只能用半形，因為全形會佔 2 字元，
為了把想法完整填入小方格裡，不斷嘗試長話短說、換個詞說。
雖然是「簡」訊，但如果只說一句話，沒把額度用滿似乎就浪費了。</p><p>現在想想，當時是把傳訊當作寫信吧。
兩者的差別不在於字數長短，而是文字落下的心情。</p></div></article></div></main><footer><div class=container style="text-align:center;color:#888;font-size:.9em;padding:40px 0"><hr style="border:0;border-top:1px solid #eee;margin-bottom:20px">Made with <a href=https://gohugo.io style=color:#888>Hugo</a> ʕ•ᴥ•ʔ <a href=https://github.com/janraasch/hugo-bearblog style=color:#888>Bear</a></div></footer></body></html>
