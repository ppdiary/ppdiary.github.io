<a href=/tags>標籤</a></div></nav></div></header><main><div class="container content"><article class=post-box><header><h1 class=post-title>獨立 vs 封閉</h1><div class=post-date>2026-05-31</div></header><div class=post-content><p>獨立是一個人完成所有事，然後不介意分享經驗
封閉是一個人默默做完所有事，不希望讓誰知道</p><p>獨立是說著「你知道嗎我今天殺了一隻大強，嚇死了」然後獲得讚嘆
封閉是想著「這跟他好像沒啥關係&mldr;」而沒有說出口</p><p>獨立是坐在牆角吃一碗肉羹麵線，任由電扇將汗滴吹落背脊
封閉是關在冷氣房一整天，感受不到 35℃ 的夏日</p><p>獨立是眾人搶購的暢銷書
封閉是不會出版的私人日記</p><p>獨立是他們說
封閉是我覺得</p><p>　即
　　便
　　　如
　　　　此</p><p>獨立是中性的
封閉也是中性的</p></div></article></div></main><footer><div class=container style="text-align:center;color:#888;font-size:.9em;padding:40px 0"><hr style="border:0;border-top:1px solid #eee;margin-bottom:20px">Made with <a href=https://gohugo.io style=color:#888>Hugo</a> ʕ•ᴥ•ʔ <a href=https://github.com/janraasch/hugo-bearblog style=color:#888>Bear</a></div></footer></body></html>
