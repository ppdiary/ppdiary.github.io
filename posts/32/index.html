<a href=/tags>標籤</a></div></nav></div></header><main><div class="container content"><article class=post-box><header><h1 class=post-title>最有生產力的時候</h1><div class=post-date>2026-04-21</div></header><div class=post-content><p>今天是我最喜歡的無鬧鐘日，
睡到自然醒，然後賴在床上東摸西摸，直到我想爬起來。
　
　
自從搬回家住之後，
這樣的日子，變得可遇不可求。
　
　
躺著傳訊息給久未聯繫的朋友，喬時間見面。
趴著滑滑社群，聽到一首平靜的鋼琴曲，鄉愁，
一查才發現是 Richard Clayderman 的作品。
　
　
起身時已超過下午 3:30，
有時會覺得，躺著反而是我最有生產力的時候。
　</p><div style='font-family:pingfang tc,stkaiti,microsoft jhenghei,sans-serif;color:#8e8b9a;text-align:right;font-size:1.5rem;margin-top:3rem;font-weight:300;letter-spacing:.12em;font-style:italic;opacity:.5'>生產的是心滿意足。</div></div></article></div></main><footer><div class=container style="text-align:center;color:#888;font-size:.9em;padding:40px 0"><hr style="border:0;border-top:1px solid #eee;margin-bottom:20px">Made with <a href=https://gohugo.io style=color:#888>Hugo</a> ʕ•ᴥ•ʔ <a href=https://github.com/janraasch/hugo-bearblog style=color:#888>Bear</a></div></footer></body></html>
