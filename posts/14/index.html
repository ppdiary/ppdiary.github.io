<a href=/tags>標籤</a></div></nav></div></header><main><div class="container content"><article class=post-box><header><h1 class=post-title>時間是推手，也是敵人</h1><div class=post-date>2026-04-03</div></header><div class=post-content><p>截稿日迫在眉睫，就會逼自己產出作品。</p><p>但如果沒有截稿日，
只有和自己的約定，
那就沒完成的那一日。</p><hr><p>不想因為期限而隨便，
就像不想為了限時特賣而衝動購物、
不想為了「這是最後一件」而被業務說服。</p><p>在匆忙的世界中，
更想留下慢．慢．來的時間。</p><p>醞釀、等待、成蛹的每一分每一秒，
都不會浪費的。</p></div></article></div></main><footer><div class=container style="text-align:center;color:#888;font-size:.9em;padding:40px 0"><hr style="border:0;border-top:1px solid #eee;margin-bottom:20px">Made with <a href=https://gohugo.io style=color:#888>Hugo</a> ʕ•ᴥ•ʔ <a href=https://github.com/janraasch/hugo-bearblog style=color:#888>Bear</a></div></footer></body></html>
