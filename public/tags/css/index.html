<style>
    .post-list {
        list-style: none;
        padding: 0;
        padding-top: 0px; 
        margin: 0;
    }

    .post-item {
        margin: 0;
        padding: 8px 0;  
        border-bottom: 0px solid rgba(155, 139, 180, 0.05);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        white-space: nowrap;
        display: flex;
        align-items: center;  
        overflow: hidden;
    }
    
    .post-header {
        display: flex;
        align-items: center;  
    }

    .post-link {
        font-family: "Noto Serif TC", "Noto Serif JP", serif;
        text-decoration: none !important;
        color: #333;
        font-weight: 500;
        font-size: 1.04rem;
        letter-spacing: 0.05em;
        transition: color 0.3s;
        
         
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .post-summary {
        display: block; 
        opacity: 0;
        visibility: hidden;  
        margin-left: 14px;
        
        transition: opacity 0.4s ease, visibility 0.4s ease; 
        
        color: #aaa;
        font-size: 0.85rem;
    }

    .summary-text {
    font-size: 0.85rem;        
    color: #888;               
    line-height: 1.6;
    font-weight: 300;          
    opacity: 0.8;              
    letter-spacing: 0.01em;
}

    .post-item:hover .post-link {
        color: #5d5461 !important;  
    }

    .post-item:hover .post-summary {
        opacity: 1;
        visibility: visible;
    }

    

     
.month-big-number {
    list-style: none;
    font-family: "Georgia", serif;  
    font-size: 5rem;                
    line-height: 1;
    color: #9B8BB4;                 
    opacity: 0.12;                  
    margin-top: 60px;
    margin-bottom: -25px;           
    margin-left: -5px;              
    font-style: italic;             
    user-select: none;
    pointer-events: none;           
}

 
.post-list > .month-big-number:first-child {
    margin-top: 10px;
}

.post-day-number {
    flex: 0 0 38px;             
    font-family: "Georgia", serif; 
    font-size: 1.3rem;          
    font-weight: 300;           
    color: #9B8BB4; 
    opacity: 0.5;               
    font-style: italic;         
    line-height: 1;
    display: inline-block;
    transition: all 0.3s ease;
}

 
.post-item:hover .post-day-number {
    opacity: 1;
    transform: translateX(2px);  
}

 
    @media (max-width: 768px) {
         
        ul.post-list .post-item {
            white-space: normal;
            display: flex;         
            align-items: center;
            width: 100%;
        }
        
         
        .post-item .post-header {
            display: flex;
            align-items: center; 
            width: 100%;
        }

        .post-header .post-day-number {
            display: inline-block;

            line-height: 1;      
            margin-top: 0;         
            padding-top: 0;        
            overflow: visible;
            text-overflow: clip;
            white-space: normal;    
            
            line-height: 1;      
            margin-top: 0;         
            padding-top: 0;        
            display: inline-block; 
        }

        .post-item .post-summary {
            display: none;          
        }
    }
</style>
