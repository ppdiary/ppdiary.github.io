name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main # 當你推送到 main 分支時觸發自動部署

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false # 徹底忽略 PaperMod
          fetch-depth: 0

      # 確保 Bear 主題有被正確抓到
      - name: Force fetch Bear theme only
        run: |
          if [ -d "themes/bear" ]; then
            echo "Bear theme folder exists."
          elif [ -d "themes/Bear" ]; then
            echo "Bear theme folder (Uppercase) exists."
          else
            git submodule update --init --recursive || true
          fi

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true # 支援 Sass/SCSS 編譯，確保樣式不漏勾

      - name: Build
        run: hugo --gc --minify # 這裡預設「絕對不會」把草稿打包進去

      # 💡 核心改動：改用 peaceiris/actions-gh-pages，將編譯好的網頁隔空外送到你的公開庫
      - name: Deploy to Public Repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          external_repository: ppdiary/ppdiary.github.io  # 你的公開庫
          publish_dir: ./public                          # Hugo 生成的網頁資料夾
          publish_branch: main                           # 目的地儲存庫的分支
