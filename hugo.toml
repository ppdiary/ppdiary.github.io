baseURL = 'https://ppdiary.github.io/blog/'
#canonifyURLs = true
#relativeURLs = true
languageCode = 'zh-tw'
title = '小紫鋼琴日記'
theme = "hugo-bearblog"

# 加入這行來精確計算中文字數
hasCJKLanguage = true

staticDir = ['static']

[params]
    description = "小紫的鋼琴學習與生活隨筆"
    dateFormat = "2006.01.02" 
    # Bear Blog 很簡單，通常不太需要複雜的 params

[[menu.main]]
    name = "首頁"
    url = "/"
    weight = 1

[[menu.main]]
    name = "近況"
    url = "/now"
    weight = 2

[[menu.main]]
    name = "文章"
    url = "/posts"
    weight = 3

[[menu.main]]
    name = "標籤"
    url = "/tags"
    weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # 允許在 Markdown 中使用原始 HTML