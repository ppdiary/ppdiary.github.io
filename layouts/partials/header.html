<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">

<style>
    /* 1. 全域結構：解決底部問題 */
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
    }

    body {
        display: flex;
        flex-direction: column;
    }

    /* 2. 中間推擠：確保 footer 到底部 */
    main {
        flex: 1 0 auto;
    }

    /* 3. 核心修正：強制所有容器置中且等寬 */
    /* Bear Blog 預設寬度約為 750px，我們設定 max-width 並用 margin auto 置中 */
    header, main, footer {
        display: block; /* 確保它們是區塊元素 */
        max-width: 750px;
        width: 90%;      /* 在小螢幕時保持邊距 */
        margin: 0 auto !important; /* !important 是為了蓋過主題可能的內建樣式 */
        box-sizing: border-box;
    }

    /* 4. 導覽列佈局：左標題、右選單 */
    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 40px 0 20px 0;
    }

    nav a {
        text-decoration: none;
        color: inherit;
    }

    /* 讓選單項目的間距更好看 */
    nav div a {
        margin-left: 15px;
    }
</style>

<nav>
    <a href="{{ "" | relURL }}" class="title">
        <span style="color: #999; margin-right: 5px; font-weight: normal;">♪</span>
        <b>{{ .Site.Title }}</b>
    </a>
    <div>
        {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}">{{ .Name }}</a>
        {{ end }}
    </div>
</nav>
