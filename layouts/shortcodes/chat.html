<div class="chat-wrap">{{ .Inner }}</div>


<style>
.chat-wrap {
  padding: 1.5rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-width: 420px; /* 維持原版精緻寬度不動 */
  margin: 0 auto;
  font-family: 'Hiragino Kaku Gothic Pro', 'Noto Sans TC', sans-serif;
}

.bubble-row {
  display: flex;
  align-items: flex-start;
  gap: 8px; /* 緊湊間距，不浪費橫向空間 */
}

.bubble-row.right {
  flex-direction: row-reverse;
}

.avatar-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

/* 還原：大頭貼退回原本最精緻的 38px 尺寸 */
.avatar {
  width: 38px;   
  height: 38px;  
  border-radius: 50%;
  background: #edf2f0;
  border: 1.5px dashed #b8c6be;
  overflow: hidden;
}

.bubble-row.right .avatar {
  background: #f2eff7;
  border: 1.5px dashed #c9bfe0;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.avatar-name {
  font-size: 10px;
  color: #a2b0a8;
  letter-spacing: 0.08em;
}

.bubble-row.right .avatar-name {
  color: #9b8bb4;
}

.bubble-wrap {
  max-width: 68%; /* 還原：維持原版黃金比例 */
}

.narrator {
  text-align: center;
  font-size: 18px;
  font-weight: 500;
  color: #9b8bb4;
  margin: 2px 0 6px;
  letter-spacing: 0.12em;
}

.bubble {
  font-size: 13.5px;
  line-height: 1.7;    /* 微調：稍微收緊行高，防止整段文字拉得太長 */
  padding: 9px 13px;   /* 緊湊的內距，讓文字包覆得剛剛好 */
  letter-spacing: 0.02em; /* 微幅微調字距，好讀但不擁擠 */
  text-align: justify;
  border-radius: 8px;
  position: relative;
}

/* 滋滋（左側）：鼠尾草綠 */
.bubble.other {
  background: #f1f5f3;
  border: 1px solid #b8c6be;
  color: #48544e;
  box-shadow: 2px 2px 0px rgba(72, 84, 78, 0.15); 
}

.bubble.other::before {
  content: '';
  position: absolute;
  left: -6px;
  top: 13px; 
  border-top: 5px solid transparent;
  border-bottom: 5px solid transparent;
  border-right: 6px solid #b8c6be;
}

/* 波波（右側）：薰衣草紫 */
.bubble.me {
  background: #f2eff7;
  border: 1px solid #c9bfe0;
  color: #6a5f80;
  box-shadow: 2px 2px 0px rgba(106, 95, 128, 0.12);
}

.bubble.me::after {
  content: '';
  position: absolute;
  right: -6px;
  top: 13px;
  border-top: 5px solid transparent;
  border-bottom: 5px solid transparent;
  border-left: 6px solid #c9bfe0;
}
</style>
