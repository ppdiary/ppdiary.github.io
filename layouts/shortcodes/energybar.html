{{ $g := .Get "g" | default 25 }}
{{ $l := .Get "l" | default 25 }}
{{ $h := .Get "h" | default 25 }}
{{ $w := .Get "w" | default 25 }}

<div style="max-width: 320px; margin: 40px auto; padding: 0 10px;">
    <div style="display: flex; height: 10px; width: 100%; gap: 0px; background-color: #f0f0f0; border-radius: 8px;">
        
        <div class="energy-segment" style="width: {{ $g }}%; background-color: #C9B4C7; border-radius: 8px 0 0 8px;" data-info="遊戲 {{ $g }}%"></div>
        
        <div class="energy-segment" style="width: {{ $l }}%; background-color: #DFBFB2; border-radius: 0;" data-info="愛 {{ $l }}%"></div>
        
        <div class="energy-segment" style="width: {{ $h }}%; background-color: #A9B7AA; border-radius: 0;" data-info="健康 {{ $h }}%"></div>
        
        <div class="energy-segment" style="width: {{ $w }}%; background-color: #8E9AAF; border-radius: 0 8px 8px 0;" data-info="工作 {{ $w }}%"></div>
        
    </div>
</div>

<style>
    .energy-segment {
        position: relative;
        transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        cursor: pointer;
        /* 移除 flex 居中，避免微小像素偏移導致的接縫 */
    }
    
    .energy-segment::after {
        content: attr(data-info);
        position: absolute;
        bottom: 10px; 
        left: 50%;
        transform: translateX(-50%); /* 確保文字在自己的色塊中心 */
        font-family: sans-serif;
        font-size: 11px;
        color: #777;
        opacity: 0;
        white-space: nowrap;
        transition: all 0.3s ease;
        pointer-events: none;
    }

    .energy-segment:hover {
        filter: brightness(1.05);
        z-index: 10;
    }

    .energy-segment:hover::after {
        opacity: 1;
        bottom: 16px; /* 向上浮動，更優雅 */
    }
</style>
