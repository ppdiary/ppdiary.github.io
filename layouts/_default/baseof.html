<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
    
<link rel="icon" href="{{ "favicon.png" | absURL }}">
    
    {{ $style := resources.Get "style.css" | minify | fingerprint }}
    
    {{ if $style }}
        <link rel="stylesheet" href="{{ $style.Permalink }}" integrity="{{ $style.Data.Integrity }}">
    {{ end }}
</head>

<body>
    <div class="fixed-piano-container"></div>
    <header>
        <div class="container">
            <nav>
                <a href="{{ "" | relURL }}" style="font-size: 1.2rem;"><b>{{ .Site.Title }}</b></a>
                <div class="links">
                    {{ range .Site.Menus.main }}
                    <a href="{{ .URL | relURL }}">{{ .Name }}</a>
                    {{ end }}
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="container content">
            {{ block "main" . }}{{ end }}
        </div>
    </main>

    <footer>
        <div class="container" style="text-align: center; color: #888; font-size: 0.9em; padding: 40px 0;">
            <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">
            Made with <a href="https://gohugo.io" style="color: #888;">Hugo</a> ʕ•ᴥ•ʔ <a href="https://github.com/janraasch/hugo-bearblog" style="color: #888;">Bear</a>
        </div>
    </footer>
</body>
</html>
