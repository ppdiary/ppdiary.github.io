{{ define "main" }}
<main>
    <h1>{{ .Title }}</h1>
    <div class="tag-cloud">
        {{ range .Data.Terms }}
            <a href="{{ .Page.Permalink }}" class="tag-button">
                {{ .Page.Title }} <span>({{ .Count }})</span>
            </a>
        {{ end }}
    </div>
</main>

<style>
    .tag-cloud {
        display: flex;
        flex-wrap: wrap; /* 讓標籤自動換行，不再是一行一個 */
        gap: 8px;      /* 標籤之間的間距 */
        margin-top: 20px;
    }

    .tag-button {
        display: inline-block;
        padding: 2px 12px;
        background-color: #e6e1f0; /* 淺灰色背景 */
        border-radius: 20px;       /* 圓角造型 */
        text-decoration: none;
        color: #8b7faf;
        font-size: 0.85rem;
        border: 1px solid #d1c0e4;
        transition: all 0.2s;
    }

    .tag-button search {
        font-size: 0.7rem;
        color: #888;
    }

    .tag-button:hover {
        background-color: #8b7faf;   /* 懸停時變黑底白字 */
        color: #fff;
        transform: translateY(-2px); /* 輕微浮起感 */
    }
</style>
{{ end }}
